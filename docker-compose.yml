# ─────────────────────────────────────────────────────────────────
# Full stack — tất cả chạy trong Docker.
# Projects: copy folder project vào ./projects/<tên>/
# Ví dụ: cp -r ~/Desktop/projects/my-app ./projects/my-app
#
# Khởi động: ./start.sh
# ─────────────────────────────────────────────────────────────────

services:

  # ── Vector Store ────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - openclaw_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Embedding Model ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw_net
    # GPU (uncomment nếu có):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Gateway ─────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      # App source bind mount để uvicorn --reload hot-reload khi sửa file local
      - ./gateway:/app
      # Projects — mỗi folder 1 volume, tên tùy ý
      # Thêm project mới: thêm 1 dòng, đổi tên sau dấu :
      # Format: /path/on/host:/projects/<tên>:ro
      - ./projects:/projects:ro
      # Ví dụ thêm project từ path khác:
      # - /Users/kingsley/work/backend:/projects/backend:ro
      # - /Users/kingsley/Desktop/lisroe:/projects/lisroe:ro
      # Config riêng (rw) — gateway.db
      - gateway_config:/config
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBED_MODEL=nomic-embed-text
      - HOST_MOUNT_PREFIX=/projects
      # Tắt ChromaDB telemetry warning
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_TELEMETRY=false
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - openclaw_net

volumes:
  chroma_data:
  ollama_data:
  gateway_config:

networks:
  openclaw_net:
    driver: bridge
