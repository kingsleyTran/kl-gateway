version: "3.9"

# ─────────────────────────────────────────────────────────────────
# OpenClaw Gateway Stack
# Tất cả data lưu trong ./data/ — dễ backup, dễ inspect.
# Khởi động: ./start.sh
# ─────────────────────────────────────────────────────────────────

services:

  # ── Redis (job queue) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - openclaw_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Index Worker (arq) ───────────────────────────
  worker:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: worker
    volumes:
      - ./projects:/projects:ro
      - ./data/gateway:/config
      - ./gateway:/app
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBED_MODEL=nomic-embed-text
      - HOST_MOUNT_PREFIX=/projects
      - REDIS_URL=redis://redis:6379
    command: ["arq", "worker.WorkerSettings"]
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - openclaw_net
    restart: unless-stopped

  # ── ChromaDB ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_TELEMETRY=false
    networks:
      - openclaw_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Ollama ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - openclaw_net
    # GPU (uncomment nếu có):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Copilot API ──────────────────────────────────
  copilot-api:
    image: ghcr.io/ericc-ch/copilot-api:latest
    container_name: copilot-api
    ports:
      - "4141:4141"
    volumes:
      - ./data/copilot:/root/.local/share/copilot-api
    env_file:
      # Gateway ghi token vào file này sau khi auth
      # copilot-api tự đọc GITHUB_TOKEN từ env khi start
      - path: ./data/copilot/env
        required: false
    networks:
      - openclaw_net
    restart: unless-stopped

  # ── Gateway ──────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./projects:/projects:ro
      - ./data/gateway:/config
      - ./data/copilot:/copilot-data
      - /var/run/docker.sock:/var/run/docker.sock
      # Hot reload — mount source trực tiếp, uvicorn tự reload khi sửa file
      - ./gateway:/app
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBED_MODEL=nomic-embed-text
      - HOST_MOUNT_PREFIX=/projects
      - COPILOT_API_URL=http://copilot-api:4141
      - REDIS_URL=redis://redis:6379
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_TELEMETRY=false
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      copilot-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - openclaw_net

networks:
  openclaw_net:
    driver: bridge
