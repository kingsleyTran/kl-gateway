version: "3.9"

# ─────────────────────────────────────────────────────────────────
# OpenClaw Gateway Stack
#
# Lần đầu chạy: gateway mở Bootstrap UI tại http://localhost:8080
# Sau bootstrap: .env được generate vào ./config/.env và gateway restart
#
# OpenClaw chạy trên HOST, gọi gateway qua http://localhost:8080
# Projects mount từ host vào /projects/<name> — dynamic, không cần khai báo trước
# ─────────────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────
  # Vector Store
  # ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - openclaw_net

  # ─────────────────────────────────────────
  # Embedding Model
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw_net
    # GPU (uncomment nếu có):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─────────────────────────────────────────
  # GitHub Copilot sidecar
  # Expose Copilot như OpenAI-compatible endpoint
  # ─────────────────────────────────────────
  copilot-api:
    image: ghcr.io/ekzhu/copilot-api:latest
    container_name: copilot-api
    ports:
      - "4000:4000"
    environment:
      - COPILOT_TOKEN=${COPILOT_TOKEN:-}
    networks:
      - openclaw_net
    profiles:
      - copilot   # Chỉ start khi: docker compose --profile copilot up

  # ─────────────────────────────────────────
  # Gateway
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      # Config dir — gateway ghi .env vào đây sau bootstrap
      - ./config:/config
      # Projects — thêm project mới: thêm 1 dòng, đặt tên bất kỳ
      - ${PROJECT_1_PATH:-/tmp}:/projects/project-1:rw
      - ${PROJECT_2_PATH:-/tmp}:/projects/project-2:rw
      # - ${PROJECT_3_PATH}:/projects/my-new-project:rw
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBED_MODEL=nomic-embed-text
      - PROJECTS_ROOT=/projects
      - COPILOT_API_URL=http://copilot-api:4000
    depends_on:
      - chromadb
      - ollama
    restart: unless-stopped
    networks:
      - openclaw_net

volumes:
  chroma_data:
  ollama_data:

networks:
  openclaw_net:
    driver: bridge
