version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Full stack — tất cả chạy trong Docker.
# Host filesystem được mount vào /host để gateway đọc project files.
#
# Khởi động: ./start.sh
# ─────────────────────────────────────────────────────────────────

services:

  # ── Vector Store ────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - openclaw_net

  # ── Embedding Model ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw_net
    # GPU (uncomment nếu có):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Gateway ─────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      # Toàn bộ home dir → /host trên container
      # Gateway tự prefix /host khi đọc file
      - ${HOST_HOME:-~}:/host:ro
      # Config riêng (rw) — .env + gateway.db
      - gateway_config:/config
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBED_MODEL=nomic-embed-text
      # Prefix này được gateway dùng để resolve path thật
      - HOST_MOUNT_PREFIX=/host
    depends_on:
      - chromadb
      - ollama
    restart: unless-stopped
    networks:
      - openclaw_net

volumes:
  chroma_data:
  ollama_data:
  gateway_config:

networks:
  openclaw_net:
    driver: bridge
